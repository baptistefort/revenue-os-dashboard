name: ops

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  database:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ops}
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - ops_postgres_data:/var/lib/postgresql/data
    networks:
      - ops_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    pids_limit: 256
    cpus: "0.75"
    mem_limit: 1536m
    shm_size: 256m
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER:-ops}" -d "$${POSTGRES_DB:-ops}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *common-logging

  database-migrate:
    image: pgvector/pgvector:pg17
    restart: "no"
    init: true
    read_only: true
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      MIGRATIONS_DIR: /migrations
    command:
      - sh
      - /scripts/migrate-database.sh
    volumes:
      - ./database/migrations:/migrations:ro
      - ./scripts/migrate-database.sh:/scripts/migrate-database.sh:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    networks:
      - ops_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    cpus: "0.25"
    mem_limit: 256m
    logging: *common-logging

  opencode:
    image: ops-opencode:1.18.2
    build:
      context: .
      dockerfile: deploy/opencode/Dockerfile
    restart: unless-stopped
    init: true
    read_only: true
    env_file:
      - .env.production
    environment:
      OPENCODE_HOSTNAME: 0.0.0.0
      OPENCODE_PORT: "4096"
      OPENCODE_DIRECTORY: /workspace/ops
      OBSIDIAN_VAULT_PATH: /data/obsidian
      FISH_AUDIO_API_KEY: ""
      FISH_AUDIO_REFERENCE_ID: ""
    expose:
      - "4096"
    volumes:
      - ./data/obsidian:/data/obsidian:ro
      - opencode_cache:/home/opencode/.cache/opencode
      - opencode_config:/home/opencode/.config/opencode
      - opencode_data:/home/opencode/.local/share/opencode
      - opencode_state:/home/opencode/.local/state/opencode
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=1777
    networks:
      - ops_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    cpus: "1.00"
    mem_limit: 2g
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const h='Basic '+Buffer.from((process.env.OPENCODE_SERVER_USERNAME||'opencode')+':'+process.env.OPENCODE_SERVER_PASSWORD).toString('base64');fetch('http://127.0.0.1:4096/global/health',{headers:{authorization:h}}).then(r=>{if(!r.ok)process.exit(1);return r.json()}).then(v=>{if(v.healthy!==true)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    logging: *common-logging

  app:
    image: ops-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    user: "1001:1001"
    restart: unless-stopped
    init: true
    read_only: true
    depends_on:
      database-migrate:
        condition: service_completed_successfully
      opencode:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      OPENCODE_BASE_URL: http://opencode:4096
      OPENCODE_DIRECTORY: /workspace/ops
      OBSIDIAN_VAULT_PATH: /data/obsidian
      OPS_DOCUMENTS_PATH: /data/documents
      OPS_BUSINESS_DATE: ${OPS_BUSINESS_DATE:-2026-07-17}
    expose:
      - "3000"
    command:
      - sh
      - -c
      - umask 007 && exec node server.js
    volumes:
      - ./data/obsidian:/data/obsidian
      - ./data/documents:/data/documents
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m,mode=1777
      - /workspace/.next/cache:rw,noexec,nosuid,size=128m,uid=1001,gid=1001,mode=0750
    networks:
      ops_private:
      caddy_shared:
        aliases:
          - ops-app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    cpus: "0.75"
    mem_limit: 1g
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *common-logging

  vault-seed:
    image: ops-opencode:1.18.2
    build:
      context: .
      dockerfile: deploy/opencode/Dockerfile
    profiles:
      - tools
    user: "1001:1002"
    init: true
    environment:
      OBSIDIAN_VAULT_PATH: /data/obsidian
    command:
      - sh
      - -c
      - umask 007 && exec node scripts/seed-obsidian.mjs
    volumes:
      - ./data/obsidian:/data/obsidian
    network_mode: none
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 128
    logging: *common-logging

  database-seed:
    image: pgvector/pgvector:pg17
    profiles:
      - tools
    init: true
    read_only: true
    depends_on:
      database-migrate:
        condition: service_completed_successfully
    env_file:
      - .env.production
    environment:
      OPS_SEED_DATABASE: allow
      SEEDS_DIR: /seeds
    command:
      - sh
      - /scripts/seed-database.sh
    volumes:
      - ./database/seeds:/seeds:ro
      - ./scripts/seed-database.sh:/scripts/seed-database.sh:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    networks:
      - ops_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 256m
    logging: *common-logging

  central-memory-seed:
    image: ops-opencode:1.18.2
    build:
      context: .
      dockerfile: deploy/opencode/Dockerfile
    profiles:
      - tools
    init: true
    read_only: true
    depends_on:
      database-migrate:
        condition: service_completed_successfully
    env_file:
      - .env.production
    environment:
      OPS_ORGANIZATION_SLUG: ${OPS_ORGANIZATION_SLUG:-atelier-beaumarchais}
      OPS_UNIVERSE_AS_OF: ${OPS_UNIVERSE_AS_OF:-2026-07-17T08:00:00.000Z}
    command:
      - ./node_modules/.bin/tsx
      - scripts/seed-central-memory.ts
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    networks:
      - ops_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 160
    logging: *common-logging

  central-memory-project:
    image: ops-opencode:1.18.2
    build:
      context: .
      dockerfile: deploy/opencode/Dockerfile
    profiles:
      - tools
    user: "1001:1002"
    init: true
    read_only: true
    depends_on:
      database-migrate:
        condition: service_completed_successfully
    env_file:
      - .env.production
    environment:
      OPS_ORGANIZATION_SLUG: ${OPS_ORGANIZATION_SLUG:-atelier-beaumarchais}
      # Keep the PostgreSQL projection inside the same business vault as the
      # curated notes. Writing /data/obsidian/Central beside that vault would
      # pass the first release but be rejected as a mixed layout on the next.
      OBSIDIAN_VAULT_PATH: "/data/obsidian/OPS — Atelier Beaumarchais"
    command:
      - ./node_modules/.bin/tsx
      - scripts/project-central-memory.ts
    volumes:
      - ./data/obsidian:/data/obsidian
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    networks:
      - ops_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 160
    logging: *common-logging

networks:
  ops_private:
    name: ops_private
  caddy_shared:
    name: sags-os_default
    external: true

volumes:
  opencode_cache:
  opencode_config:
  opencode_data:
  opencode_state:
  ops_postgres_data:
